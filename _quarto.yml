project:
  type: website
  output-dir: _site
  resources:
    - "assets/**"

website:
  title: ""  # Empty to let article title be first in <title>
  description: "Automated daily briefings on the latest AI research and industry breakthroughs."
  site-url: "https://roboaidigest.com"
  favicon: assets/logo-mark.svg
  open-graph: true
  twitter-card:
    site: "@roboaidigest"
    creator: "@roboaidigest"
    card-style: summary_large_image
    image: "https://roboaidigest.com/social-share.png"
  navbar:
    logo: assets/logo-horizontal.svg
    background: "#0d1117"
    foreground: light
    left:
      - href: index.qmd
        text: Latest
      - href: about.qmd
        text: About
    right:
      - icon: github
        href: https://github.com/gfigon/ainews

format:
  html:
    theme:
      dark: cosmo
    css:
      - assets/colors_and_type.css
      - styles.css
      - hide-elements.css
    toc: true
    code-fold: true
    canonical-url: true
    title-block-categories: false
    title-block-style: plain
    title-separator: " | "
    include-before-body: includes/after-body.html
    include-after-body: _partials/footer.html
    date-format: "YYYY-MM-DD HH:mm"
    filters:
      - filters/nofollow.lua

editor: visual

header-includes: |
  <!-- Google Consent Mode v2 - musi być PRZED GTM -->
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}

    gtag('consent', 'default', {
      'ad_storage': 'denied',
      'ad_user_data': 'denied',
      'ad_personalization': 'denied',
      'analytics_storage': 'denied',
      'wait_for_update': 500
    });
  </script>
  <!-- Klaro Cookie Consent - CSS -->
  <link rel="stylesheet" href="https://cdn.kiprotect.com/klaro/v0.7/klaro.css"/>
  <!-- Klaro Cookie Consent - Konfiguracja -->
  <script defer type="text/javascript" src="/klaro-config.js"></script>
  <!-- Klaro Cookie Consent - Biblioteka -->
  <script defer data-config="klaroConfig" type="text/javascript" src="https://cdn.kiprotect.com/klaro/v0.7/klaro.js"></script>
  <!-- Google Tag Manager -->
  <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start': new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0], j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src= 'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f); })(window,document,'script','dataLayer','GTM-WR6KBLTV');</script>
  <!-- End Google Tag Manager -->
  <!-- Lucide icons (replaces Bootstrap Icons per design system) -->
  <script defer src="https://unpkg.com/lucide@latest"></script>
  <script defer>document.addEventListener('DOMContentLoaded',function(){if(window.lucide){lucide.createIcons();}});</script>
  <meta name="author" content="Robo AI Digest">
  <meta name="description" content="Daily AI news and insights on LLMs, AI Agents, Machine Learning breakthroughs and cutting-edge technology. Stay ahead with Robo AI Digest.">
  <meta name="robots" content="index, follow">

include-before-body-text: |
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-WR6KBLTV" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->
